version: "3"

tasks:
  default:
    cmds:
      - task: test

  test:
    desc: Run unit tests
    cmds:
      - go test ./pkg/...

  test-integration:
    desc: Run integration tests (requires Docker)
    cmds:
      - task: docker-up
      - go test ./tests/integration/ -v -timeout 120s
    status:
      - docker compose -f docker-compose.test.yml ps --quiet 2>/dev/null | grep -q .

  docker-up:
    desc: Start test databases
    cmds:
      - docker compose -f docker-compose.test.yml up -d --wait

  docker-down:
    desc: Stop test databases
    cmds:
      - docker compose -f docker-compose.test.yml down -v

  vet:
    desc: Run go vet
    cmds:
      - go vet ./pkg/... ./tests/...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./pkg/... ./tests/...

  tidy:
    desc: Tidy modules
    cmds:
      - go mod tidy

  release:
    desc: 'Create a version tag and push it (usage: task release -- v0.1.0)'
    preconditions:
      - sh: 'test -n "{{.CLI_ARGS}}"'
        msg: 'version tag required (e.g. task release -- v0.1.0)'
      - sh: 'git diff --quiet'
        msg: 'working tree has uncommitted changes'
    cmds:
      - go vet ./pkg/... ./tests/...
      - go test ./pkg/...
      - git tag {{.CLI_ARGS}}
      - git push origin {{.CLI_ARGS}}
      - echo "Tagged and pushed {{.CLI_ARGS}}"
